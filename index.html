<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>iPod Player - Black Swan</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    body {
      margin:0;
      background:#fff; /* white background */
      font-family:sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .ipod {
      width:200px; /* compact size */
      background:#ccc;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 4px 8px rgba(0,0,0,0.5);
    }
    .screen { background:#eee; padding:5px; }
    .music { text-align:center; margin-top:5px; }
    #poster { width:100%; border-radius:10px; }
    .content { margin-top:5px; }
    .content b { display:block; font-size:12px; } /* smaller title */
    .content p { margin:2px 0; font-size:10px; color:#333; } /* smaller artist/date */
    .bar-box { display:flex; align-items:center; font-size:9px; margin-top:5px; } /* smaller time labels */
    .bar { flex:1; height:5px; background:#bbb; margin:0 5px; position:relative; border-radius:3px; }
    .progress { height:5px; background:#ff0000; width:0%; border-radius:3px; }
    .controls { display:flex; justify-content:space-around; align-items:center; padding:5px 0; background:#ddd; }
    .controls button, .controls i { cursor:pointer; font-size:14px; }
  </style>
</head>
<body>

<div class="ipod">
  <div class="screen">
    <div style="background: linear-gradient(to bottom, #fff 0%, #9e9e9e 100%);
                border-bottom:1px solid #5c5c5c; border-right:2px solid #000; border-left:2px solid #000;
                font-size:12px; padding:1px;">now playing</div>

    <div class="music">
      <audio id="myMusic" type="audio/mp3">
        <source src="https://files.catbox.moe/y0nky9.mp3" type="audio/mp3">
      </audio>
      <!-- Album Art -->
      <img id="poster" src="https://files.catbox.moe/ok5umv.jpg">
      <div class="content">
        <b class="name">Black Swan</b>
        <p class="singer">BTS</p>
        <p class="date">2020</p>
      </div>
    </div>

    <div class="bar-box">
      <p class="current-time">0:00</p>
      <div class="bar">
        <div class="progress"></div>
      </div>
      <p class="duration-time">5:36</p>
    </div>
  </div>

  <div class="controls">
    <button class="menu">MENU</button>
    <i class="fa fa-fast-backward" id="backward"></i>
    <i class="fa fa-fast-forward" id="forward"></i>
    <button class="play-pause-btn">
      <i class="fa fa-play" id="play-icon"></i>
      <i class="fa fa-pause" id="pause-icon" style="display:none;"></i>
    </button>
  </div>
</div>

<script>
  const audio = document.getElementById("myMusic");
  const playBtn = document.querySelector(".play-pause-btn");
  const playIcon = document.getElementById("play-icon");
  const pauseIcon = document.getElementById("pause-icon");
  const progress = document.querySelector(".progress");
  const currentTimeElem = document.querySelector(".current-time");
  const durationElem = document.querySelector(".duration-time");

  // Update progress bar and current time
  audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";
    const m = Math.floor(audio.currentTime/60);
    const s = Math.floor(audio.currentTime%60).toString().padStart(2,"0");
    currentTimeElem.textContent = `${m}:${s}`;
  });

  // Set total duration
  audio.addEventListener("loadedmetadata", () => {
    const m = Math.floor(audio.duration/60);
    const s = Math.floor(audio.duration%60).toString().padStart(2,"0");
    durationElem.textContent = `${m}:${s}`;
  });

  // Play/pause button
  playBtn.addEventListener("click", () => {
    if(audio.paused){
      audio.play().catch(()=>{ alert("Click play if autoplay is blocked."); });
      playIcon.style.display="none";
      pauseIcon.style.display="inline";
    } else {
      audio.pause();
      playIcon.style.display="inline";
      pauseIcon.style.display="none";
    }
  });

  // Forward/backward skip 10 seconds
  document.getElementById("forward").addEventListener("click", () => { audio.currentTime += 10; });
  document.getElementById("backward").addEventListener("click", () => { audio.currentTime -= 10; });
</script>

</body>
</html>
