<!--ipod starts-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="/ipod/style.css">
<script src="/ipod/ipod.js"></script>

<!--ipod-->
<div class="ipod">
  <div class="screen">
    <div style="background: linear-gradient(to bottom, #fff 0%, #9e9e9e 100%); border-bottom: 1px solid #5c5c5c; border-right: 2px solid #000; border-left: 2px solid #000; font-size: 12px; padding: 1px;">now playing</div>
    
    <div class="music">
      <audio id="myMusic" src="https://files.catbox.moe/y0nky9.mp3" type="audio/mp3"></audio>
      <img id="poster" src="https://files.catbox.moe/ok5umv.jpg">
      <div class="content">
        <b class="name">Black Swan</b>
        <p class="singer">BTS</p>
        <p class="date">2020</p>
      </div>
    </div>

    <div class="bar-box">
      <p class="current-time">0:00</p>
      <div class="bar">
        <div class="progress"></div>
      </div>
      <p class="duration-time">5:36</p>
    </div>
  </div>
  <!--screen-->

  <div class="controls">
    <button class="menu">MENU</button>
    <i class="fa fa-fast-backward"></i>
    <i class="fa fa-fast-forward"></i>
    <button class="play-pause-btn">
      <i class="fa fa-play"></i>
      <i class="fa fa-pause"></i>
    </button>
  </div>
</div>
<!--ipod ends-->
