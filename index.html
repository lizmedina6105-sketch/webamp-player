<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  background:white;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial, sans-serif;
}

.ipod{
  width:300px;
  background:#e5e5e5;
  border-radius:30px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.screen{
  background:white;
  border:3px solid black;
  border-radius:15px;
  padding:10px;
}

.music img{
  width:100%;
  border-radius:10px;
}

.content{
  text-align:center;
}

.bar-box{
  display:flex;
  align-items:center;
  font-size:12px;
  margin-top:5px;
}

.bar{
  flex:1;
  height:5px;
  background:#ccc;
  margin:0 5px;
  position:relative;
  border-radius:5px;
}

.progress{
  height:100%;
  width:0%;
  background:black;
  border-radius:5px;
}

.controls{
  margin-top:20px;
  text-align:center;
}

.controls button{
  background:none;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.play-btn{
  margin-top:10px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="ipod">
  <div class="screen">
    <div style="font-size:12px; text-align:center; margin-bottom:5px;">
      now playing
    </div>

    <div class="music">
      <audio id="myMusic" src="https://files.catbox.moe/y0nky9.mp3"></audio>
      <img src="https://files.catbox.moe/ok5umv.jpg">

      <div class="content">
        <b>Black Swan</b>
        <p>BTS</p>
        <p>2020</p>
      </div>
    </div>

    <div class="bar-box">
      <span id="current">0:00</span>
      <div class="bar">
        <div class="progress" id="progress"></div>
      </div>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button onclick="playPause()">PLAY / PAUSE</button>
  </div>
</div>

<script>
const audio = document.getElementById("myMusic");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

function playPause(){
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
}

audio.addEventListener("timeupdate", () => {
  const percent = (audio.currentTime / audio.duration) * 100;
  progress.style.width = percent + "%";

  let min = Math.floor(audio.currentTime / 60);
  let sec = Math.floor(audio.currentTime % 60);
  if(sec < 10) sec = "0" + sec;
  current.textContent = min + ":" + sec;
});

audio.addEventListener("loadedmetadata", () => {
  let min = Math.floor(audio.duration / 60);
  let sec = Math.floor(audio.duration % 60);
  if(sec < 10) sec = "0" + sec;
  duration.textContent = min + ":" + sec;
});
</script>

</body>
</html>
