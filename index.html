<!--ipod starts-->

<style>
  /* Force page background white without touching iPod styling */
  body {
    background: white !important;
    margin: 0 !important;
  }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="/ipod/style.css">
<script src="/ipod/ipod.js"></script>

<!--ipod-->
<div class="ipod">
  <div class="screen">
    <div style="background: linear-gradient(to bottom, #fff 0%, #9e9e9e 100%); border-bottom: 1px solid #5c5c5c; border-right: 2px solid #000; border-left: 2px solid #000; font-size: 12px; padding: 1px;">
      now playing
    </div>
    
    <div class="music">
      <!-- 🔥 CHANGE SONG FILE HERE -->
      <audio id="myMusic" src="PUT-YOUR-NEW-MP3-LINK-HERE.mp3" type="audio/mp3"></audio>
      
      <!-- Keep your image the same unless you want a new one -->
      <img id="poster" src="https://files.catbox.moe/ok5umv.jpg">
      
      <div class="content">
        <!-- 🔥 CHANGE SONG INFO HERE -->
        <b class="name">New Song Title</b>
        <p class="singer">Artist Name</p>
        <p class="date">2024</p>
      </div>
    </div>

    <div class="bar-box">
      <p class="current-time">0:00</p>
      <!-- 🔥 CHANGE DURATION TO MATCH SONG -->
      <div class="bar">
        <div class="progress"></div>
      </div>
      <p class="duration-time">3:45</p>
    </div>
  </div>

  <div class="controls">
    <button class="menu">MENU</button>
    <i class="fa fa-fast-backward"></i>
    <i class="fa fa-fast-forward"></i>
    <button class="play-pause-btn">
      <i class="fa fa-play"></i>
      <i class="fa fa-pause"></i>
    </button>
  </div>
</div>

<!--ipod ends-->
