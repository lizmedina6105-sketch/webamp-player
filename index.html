<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTS Player</title>
<link rel='stylesheet' href='https://use.fontawesome.com/releases/v5.3.1/css/all.css'>
<style>
body {
  margin: 0;
  background-color: #000;
  font-family: Helvetica, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}
#player {
  width: 350px;
  background-color: #111;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 20px #000;
  text-align: center;
}
#album-art {
  width: 120px;
  height: 120px;
  margin: 0 auto 15px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
}
#album-art img {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: 0.3s;
}
#album-art.active img.active {
  opacity: 1;
  animation: rotateAlbum 3s linear infinite;
}
@keyframes rotateAlbum { 0%{transform:rotate(0deg);}100%{transform:rotate(360deg);} }
#album-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #f86d92; }
#track-name { font-size: 14px; color: #fff; margin-bottom: 10px; }
#track-time { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; color:#ccc; }
#seek-bar-container { width: 100%; height: 6px; background: #333; border-radius: 3px; cursor: pointer; position: relative; margin-bottom: 15px; }
#seek-bar { height: 100%; background: #f86d92; width: 0%; border-radius: 3px; position: absolute; top:0; left:0; }
#player-controls { display: flex; justify-content: space-around; }
.button { background:#222; padding:15px; border-radius:10px; cursor:pointer; transition:0.2s; }
.button i { color:#ccc; font-size:20px; }
.button:hover i { color:#f86d92; }
</style>
</head>
<body>

<div id="player">
  <div id="album-art">
    <img src="https://files.catbox.moe/spjxpy.jpg" class="active" id="_1">
    <img src="https://raw.githubusercontent.com/himalayasingh/music-player-1/master/img/_2.jpg" id="_2">
    <img src="https://raw.githubusercontent.com/himalayasingh/music-player-1/master/img/_3.jpg" id="_3">
    <img src="https://raw.githubusercontent.com/himalayasingh/music-player-1/master/img/_4.jpg" id="_4">
    <img src="https://raw.githubusercontent.com/himalayasingh/music-player-1/master/img/_5.jpg" id="_5">
  </div>
  <div id="album-name">BTS</div>
  <div id="track-name"></div>
  <div id="track-time">
    <span id="current-time">00:00</span>
    <span id="track-length">00:00</span>
  </div>
  <div id="seek-bar-container"><div id="seek-bar"></div></div>
  <div id="player-controls">
    <div class="button" id="play-previous"><i class="fas fa-backward"></i></div>
    <div class="button" id="play-pause"><i class="fas fa-play"></i></div>
    <div class="button" id="play-next"><i class="fas fa-forward"></i></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script>
$(function(){
  var trackNames = ['Hip Hop Pile','Outro: Do You Think It Makes Sense?','MIC Drop','Black Swan','Louder than Bombs'];
  var albumArtworks = ['_1','_2','_3','_4','_5'];
  var trackUrl = [
    'https://files.catbox.moe/r0ffvt.mp3',
    'https://files.catbox.moe/1ano71.mp3',
    'https://files.catbox.moe/tau9rg.mp3',
    'https://files.catbox.moe/y0nky9.mp3',
    'https://files.catbox.moe/af9omq.mp3'
  ];
  var currIndex = 0;
  var audio = new Audio(trackUrl[currIndex]);

  function updateTrack(){
    $('#track-name').text(trackNames[currIndex]);
    $('#album-art img').removeClass('active');
    $('#'+albumArtworks[currIndex]).addClass('active');
    $('#album-art').removeClass('active'); // stop rotation until play
  }

  function playTrack(){
    audio.play();
    $('#play-pause i').attr('class','fas fa-pause');
    $('#album-art').addClass('active');
  }

  function pauseTrack(){
    audio.pause();
    $('#play-pause i').attr('class','fas fa-play');
    $('#album-art').removeClass('active');
  }

  function nextTrack(){
    currIndex = (currIndex+1)%trackUrl.length;
    audio.src = trackUrl[currIndex];
    updateTrack();
    playTrack();
  }

  function prevTrack(){
    currIndex = (currIndex-1+trackUrl.length)%trackUrl.length;
    audio.src = trackUrl[currIndex];
    updateTrack();
    playTrack();
  }

  $('#play-pause').click(function(){ audio.paused?playTrack():pauseTrack(); });
  $('#play-next').click(nextTrack);
  $('#play-previous').click(prevTrack);

  audio.ontimeupdate = function(){
    var prog = (audio.currentTime/audio.duration)*100;
    $('#seek-bar').css('width',prog+'%');
    var curMin=Math.floor(audio.currentTime/60), curSec=Math.floor(audio.currentTime%60);
    if(curMin<10)curMin='0'+curMin; if(curSec<10)curSec='0'+curSec;
    $('#current-time').text(curMin+':'+curSec);
    var durMin=Math.floor(audio.duration/60), durSec=Math.floor(audio.duration%60);
    if(durMin<10)durMin='0'+durMin; if(durSec<10)durSec='0'+durSec;
    if(!isNaN(durMin)&&!isNaN(durSec)) $('#track-length').text(durMin+':'+durSec);
  };

  $('#seek-bar-container').click(function(e){
    var pos=e.pageX-$(this).offset().left;
    audio.currentTime=(pos/$(this).width())*audio.duration;
  });

  updateTrack();
});
</script>

</body>
</html>
