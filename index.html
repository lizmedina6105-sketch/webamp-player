<!DOCTYPE html>
<html>
<head>
<link rel='stylesheet' href='https://use.fontawesome.com/releases/v5.3.1/css/all.css'>
<link rel="stylesheet" href="./style.css">
<style>
*:focus { outline:none; }
body > iframe:first-child { display:none !important; }
body { font-family: Helvetica, Arial; margin:0; background-color: #000; }
#app-cover { position:absolute; top:50%; right:0; left:0; width:430px; height:100px; margin:-4px auto; }
#bg-artwork { position: fixed; top: -30px; right: -30px; bottom: -30px; left: -30px; background-color: #000; background-repeat:no-repeat; background-size:cover; background-position:50%; filter: blur(40px); -webkit-filter: blur(40px); z-index:1; }
/* ... keep ALL original CSS exactly as it was ... */
</style>
</head>
<body>

<div id="app-cover">
    <div id="bg-artwork"></div>
    <div id="bg-layer"></div>
    <div id="player">
        <div id="player-track">
            <div id="album-name">BTS</div>
            <div id="track-name"></div>
            <div id="track-time">
                <div id="current-time"></div>
                <div id="track-length"></div>
            </div>
            <div id="s-area">
                <div id="ins-time"></div>
                <div id="s-hover"></div>
                <div id="seek-bar"></div>
            </div>
        </div>
        <div id="player-content">
            <div id="album-art">
                <img src="https://files.catbox.moe/spjxpy.jpg" class="active" id="_1">
                <img src="https://raw.githubusercontent.com/himalayasingh/music-player-1/master/img/_2.jpg" id="_2">
                <img src="https://raw.githubusercontent.com/himalayasingh/music-player-1/master/img/_3.jpg" id="_3">
                <img src="https://raw.githubusercontent.com/himalayasingh/music-player-1/master/img/_4.jpg" id="_4">
                <img src="https://raw.githubusercontent.com/himalayasingh/music-player-1/master/img/_5.jpg" id="_5">
                <div id="buffer-box">Buffering ...</div>
            </div>
            <div id="player-controls">
                <div class="control"><div class="button" id="play-previous"><i class="fas fa-backward"></i></div></div>
                <div class="control"><div class="button" id="play-pause-button"><i class="fas fa-play"></i></div></div>
                <div class="control"><div class="button" id="play-next"><i class="fas fa-forward"></i></div></div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<script>
$(function() {
    var albums = ['BTS','BTS','BTS','BTS','BTS']; // Album title fixed
    var trackNames = ['Hip Hop Pile','Outro: Do You Think It Makes Sense?','MIC Drop','Black Swan','Louder than Bombs'];
    var albumArtworks = ['_1','_2','_3','_4','_5'];
    var trackUrl = [
        'https://files.catbox.moe/r0ffvt.mp3',
        'https://files.catbox.moe/1ano71.mp3',
        'https://files.catbox.moe/tau9rg.mp3',
        'https://files.catbox.moe/y0nky9.mp3',
        'https://files.catbox.moe/af9omq.mp3'
    ];
    var playPreviousTrackButton = $('#play-previous');
    var playNextTrackButton = $('#play-next');
    var playPauseButton = $("#play-pause-button");
    var i = playPauseButton.find('i');
    var currIndex = -1;
    var audio;

    function selectTrack(flag) {
        if(flag==0||flag==1) ++currIndex; else --currIndex;
        if(currIndex<0) currIndex = trackUrl.length-1;
        if(currIndex>=trackUrl.length) currIndex = 0;
        if(audio) audio.pause();
        audio = new Audio(trackUrl[currIndex]);
        audio.play();
        i.attr('class','fas fa-pause');
        $('#album-name').text(albums[currIndex]);
        $('#track-name').text(trackNames[currIndex]);
        $('#album-art img').removeClass('active');
        $('#'+albumArtworks[currIndex]).addClass('active');
        audio.ontimeupdate = function() {
            var progress = (audio.currentTime/audio.duration)*100;
            $('#seek-bar').css('width',progress+'%');
        };
    }

    playPauseButton.on('click',function(){
        if(!audio) { selectTrack(0); return; }
        if(audio.paused){ audio.play(); i.attr('class','fas fa-pause'); }
        else{ audio.pause(); i.attr('class','fas fa-play'); }
    });

    playPreviousTrackButton.on('click',function(){ selectTrack(-1); });
    playNextTrackButton.on('click',function(){ selectTrack(1); });
});
</script>

</body>
</html>
